<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="jakarta.faces.facelets" template="../templates/template.xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:my="jakarta.faces.composite/composite">
  <ui:define name="title">Keycloak OIDC Authentication</ui:define>
  <ui:define name="content">
    <h3>Using the Keycloak Identity Provider for OIDC Authentication</h3>
    <h:form id="form">
      <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
      <div class="card">
        <h1>OpenID Connect Sandbox</h1>
        <p:tabView id="oidc-tabs" activeIndex="#{param.activeIndex}">
          <p:tab title="1. Discovery">
            <my:discovery-tab bean="#{openIdConnectView}"
                              discoveryOutputValue="OpenID provider configuration"/>
          </p:tab>
          <ui:include src="../tabs/authentication-oidc-tab.xhtml"/>
          <ui:include src="../tabs/token-oidc-tab.xhtml"/>
          <ui:include src="../tabs/refresh-oidc-tab.xhtml"/>
          <ui:include src="../tabs/userinfo-oidc-tab.xhtml"/>
          <ui:include src="../tabs/reset-oidc-tab.xhtml"/>
        </p:tabView>
      </div>
    </h:form>
  </ui:define>
</ui:composition>
