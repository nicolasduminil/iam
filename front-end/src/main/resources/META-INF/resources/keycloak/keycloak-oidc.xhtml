<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="jakarta.faces.facelets" template="../templates/template.xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:my="jakarta.faces.composite/composite">
  <ui:define name="title">Keycloak OIDC Authentication</ui:define>
  <ui:define name="content">
    <h3>Using the Keycloak Identity Provider for OIDC Authentication</h3>
    <h:form id="form">
      <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
      <div class="card">
        <h5>OpenID Connect Sandbox</h5>
        <p:tabView id="oidc-tabs" activeIndex="#{param.activeIndex}">
          <p:tab id="discovery-tab" title="1. Discovery">
            <my:discovery-tab id="discovery-tab-component" bean="#{openIdConnectView}"
                              discoveryOutputValue="OpenID provider configuration"/>
          </p:tab>
          <p:tab id="authentication-oidc-tab" title="2. Authentication">
            <ui:include id="include-authentication-oidc-tab" src="../tabs/authentication-oidc-tab.xhtml">
              <ui:param name="oidc" value="true"></ui:param>
            </ui:include>
          </p:tab>
          <p:tab id="token-tab" title="3. ID Token">
            <ui:include id="include-token-oidc-tab" src="../tabs/token-oidc-tab.xhtml"/>
          </p:tab>
          <p:tab id="refresh-tab" title="4. Refresh Token">
            <ui:include id="include-refresh-oidc-tab" src="../tabs/refresh-oidc-tab.xhtml"/>
          </p:tab>
          <p:tab id="userinfo-tab" title="5. UserInfo">
            <ui:include id="include-userinfo-oidc-tab" src="../tabs/userinfo-oidc-tab.xhtml"/>
          </p:tab>
          <p:tab id="reset-tab" title="Reset">
            <ui:include id="include-reset-oidc-tab" src="../tabs/reset-oidc-tab.xhtml"/>
          </p:tab>
        </p:tabView>
      </div>
    </h:form>
  </ui:define>
</ui:composition>
