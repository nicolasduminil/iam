<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="jakarta.faces.facelets" template="../templates/template.xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:my="jakarta.faces.composite/composite">
<ui:define name="title">Keycloak OAuth 2.0 Authorization</ui:define>
  <ui:define name="content">
    <h3>Using the Keycloak Identity Provider for OAuth 2.0 AUthorization</h3>
      <h:form id="form">
        <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
        <div class="card">
          <h5>OAuth 2.0 Sandbox</h5>
          <p:tabView id="oidc-tabs" activeIndex="#{param.activeIndex}">
            <p:tab id="discovery-tab" title="1. Discovery">
              <my:discovery-tab bean="#{openIdConnectView}"
                                discoveryOutputValue="OAuth 2.0 provider configuration"/>
            </p:tab>
            <p:tab id="authorization-oauth20-tab" title="2. Authorization">
              <ui:include id="include-authorization-oauth20-tab" src="../tabs/authorization-oauth20-tab.xhtml"/>
            </p:tab>
            <p:tab id="invoke-service-tab" title="3. Invoke Service">
              <ui:include id="include-invoke-service-tab" src="../tabs/invoke-service-oauth20-tab.xhtml"/>
            </p:tab>
            <p:tab id="reset-tab" title="Reset">
              <ui:include id="include-reset-oidc-tab" src="../tabs/reset-oidc-tab.xhtml"/>
            </p:tab>
          </p:tabView>
        </div>
      </h:form>
  </ui:define>
</ui:composition>
