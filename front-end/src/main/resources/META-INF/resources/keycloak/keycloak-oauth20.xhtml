<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="jakarta.faces.facelets" template="../templates/template.xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:my="jakarta.faces.composite/composite">
<ui:define name="title">Keycloak OAuth 2.0 Authorization</ui:define>
  <ui:define name="content">
    <h3>Using the Keycloak Identity Provider for OAuth 2.0 AUthorization</h3>
    <f:view contentType="text/html">
      <h:head>
      </h:head>
      <h:form id="form">
        <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
        <div class="card">
          <h1>OpenID Connect Sandbox</h1>
          <p:tabView activeIndex="#{param.activeIndex}">
            <p:tab title="1. Discovery">
              <my:discovery-tab bean="#{openIdConnectView}"
                                discovery-output-value="OAuth 2.0 provider configuration"/>
            </p:tab>
            <ui:include src="../tabs/discovery-ouath20-tab.xhtml"/>
            <ui:include src="../tabs/authentication-ouath20-tab.xhtml"/>
            <ui:include src="../tabs/token-ouath20-tab.xhtml"/>
            <ui:include src="../tabs/refresh-ouath20-tab.xhtml"/>
            <ui:include src="../tabs/userinfo-ouath20-tab.xhtml"/>
            <ui:include src="../tabs/reset-ouath20-tab.xhtml"/>
          </p:tabView>
        </div>
      </h:form>
    </f:view>
  </ui:define>
</ui:composition>
