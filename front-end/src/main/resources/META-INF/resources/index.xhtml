<!DOCTYPE html>
<html lang="en"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html">
  <h:head>
  </h:head>
  <h:body>
    <div class="card">
      <h3>OpenID Connect Sandbox</h3>
      <p:tabView>
        <p:tab title="Discovery">
          <h4>Issuer URI</h4>
          <p:row>
            <p:column>
              <p:inputText id="issuer-uri" styleClass="block" value="#{openIdConnectView.issuer}"
                           style="display:block;width: 430px"/>
              <p:watermark for="issuer-uri" value="#{openIdConnectView.issuer}"/>
              <small class="block ui-state-error">Type the issuer URI or accept the default</small>
            </p:column>
          </p:row>
          <h4></h4>
          <p:row>
            <p:column>
              <h4>Metadata</h4>
            </p:column>
          </p:row>
          <p:row>
            <p:column style="background-color: lightcoral" rendered="#{openIdConnectView.loadDiscovery}">
              <p:scrollPanel style="width:1000px;height:20" id="metadata" header="Metadata" footer="Metadata Details"
                             rendered="#{openIdConnectView.loadDiscovery}">
                <h:outputText value="#{openIdConnectView.loadDiscovery}"/>
              </p:scrollPanel>
            </p:column>
          </p:row>
          <p:row>
            <p:column styleClass="ui-grid-col-12">
              <p:commandButton value="Discover" styleClass="mr-2" style="width: auto"
                               action="#{openIdConnectView.loadDiscovery}">
                <f:ajax execute="@form" render="discoveryOutput"/>
              </p:commandButton>
            </p:column>
          </p:row>
          <p:row id="discoveryOutput">
            <h:outputText value="Discovery Document:"
                          rendered="#{not empty openIdConnectView.discoveryJson}"/>
            <pre>
                <h:outputText value="#{openIdConnectView.discoveryJson}"/>
            </pre>
          </p:row>
        </p:tab>
      </p:tabView>
    </div>
  </h:body>
</f:view>
</html>
