<!DOCTYPE html>
<html lang="en"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">
<f:view contentType="text/html">
  <h:head>
  </h:head>
  <h:body>
    <h:form id="form">
      <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
      <div class="card">
        <h1>OpenID Connect Sandbox</h1>
        <p:tabView activeIndex="#{param.activeIndex}">
          <ui:include src="tabs/discovery-tab.xhtml"/>
          <ui:include src="tabs/authentication-tab.xhtml"/>
          <ui:include src="tabs/token-tab.xhtml"/>
          <ui:include src="tabs/refresh-tab.xhtml"/>
          <ui:include src="tabs/userinfo-tab.xhtml"/>
          <ui:include src="tabs/reset-tab.xhtml"/>
        </p:tabView>
      </div>
    </h:form>
  </h:body>
</f:view>
</html>
