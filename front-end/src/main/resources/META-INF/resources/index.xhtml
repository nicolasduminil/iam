<!DOCTYPE html>
<html lang="en"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html">
    <h:head>
    </h:head>
    <h:body>
        <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
        <div class="card">
            <h5 class="mt-0">OpenID Connect Sandbox</h5>
            <p:tabView>
                <p:tab title="Discovery">
                    <!--h5>The Issuer URL</h5-->
                    <h:form id="issuer-form">
                        <h:panelGrid id="issuer-grid" columns="4" cellpadding="7">
                            <p:outputLabel for="issuer-url" value="Issuer URL:"/>
                            <p:inputText id="issuer-url"/>
                        </h:panelGrid>
                        <p:commandButton value="Load Privider Metadata" update="issuer-grid" styleClass="mt-3" />
                        <h:outputText id="metadata" rendered="#{openIdConnectView.metadata}" value="#{openIdConnectView.metadata}"/>
                    </h:form>
                </p:tab>
                <p:tab title="Authentication">
                    <h:form id="authentication-form">
                    </h:form>
                </p:tab>
                <p:tab title="Token">
                    <h:form id="token-form">
                    </h:form>
                </p:tab>
                <p:tab title="Refresh">
                    <h:form id="refresh-form">
                    </h:form>
                </p:tab>
                <p:tab title="Userinfo">
                    <h:form id="user-info-form">
                    </h:form>
                </p:tab>
            </p:tabView>
        </div>
    </h:body>
</f:view>
</html>
