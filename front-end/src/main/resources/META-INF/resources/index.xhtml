<!DOCTYPE html>
<html lang="en"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html">
  <h:head>
  </h:head>
  <h:body>
    <h:form id="form">
      <p:growl id="msgs" showDetail="true" skipDetailIfEqualsSummary="true"/>
      <div class="card">
        <h1>OpenID Connect Sandbox</h1>
        <p:tabView activeIndex="#{param.activeIndex}">
          <p:ajax event="tabChange" listener="#{openIdConnectView.onTabChange}" update=":form:msgs"/>
          <p:ajax event="tabClose" listener="#{openIdConnectView.onTabClose}" update=":form:msgs"/>
          <p:tab title="1. Discovery">
            <p:panelGrid columns="1" cellpadding="7" styleClass="mb-3">
              <p:outputLabel for="issuer-uri" value="Issuer URI:"/>
              <p:inputText id="issuer-uri" size="40" maxlength="255"
                           value="#{openIdConnectView.issuer}" required="true"
                           label="issuer-uri">
                <f:validateLength minimum="30"/>
              </p:inputText>
              <p:message for="issuer-uri" display="icon"/>
            </p:panelGrid>
            <p:commandButton
              value="#{empty openIdConnectView.discoveryJson ? 'Discover' : (openIdConnectView.showDiscoveryJson ? 'Hide Details' : 'Show Details')}"
              update="@form :form:msgs" process="@this issuer-uri"
              action="#{openIdConnectView.loadDiscovery}"
              onclick="console.log('Button clicked');"
              oncomplete="console.log('Request completed');"
              icon="#{empty openIdConnectView.discoveryJson ? 'pi pi-check' : (openIdConnectView.showDiscoveryJson ? 'pi pi-eye-slash' : 'pi pi-eye')}"/>
            <div style="height: 10px;"></div>
            <p:outputPanel id="introspection-details-panel" style="max-height: 20em; max-width: 60em; overflow: auto;">
              <h:outputLabel for="introspection-details" value="OpenID provider configuration: "
                             rendered="#{not empty openIdConnectView.discoveryJson and openIdConnectView.showDiscoveryJson}"/>
              <div style="height: 10px;"></div>
              <p:inputTextarea id="introspection-details" value="#{openIdConnectView.discoveryJson}"
                               readonly="true" autoResize="false" rows="10" cols="30"
                               style="width: 100%; height: 100%; border: 1px solid #ccc;"
                               rendered="#{not empty openIdConnectView.discoveryJson and openIdConnectView.showDiscoveryJson}"/>
            </p:outputPanel>
          </p:tab>
          <p:tab title="2. Authentication">
            <h:panelGrid id="auth-panelGrid" columns="3" styleClass="mb-3">
              <p:outputLabel for="client-id" value="Client ID:"/>
              <p:inputText id="client-id"
                           value="#{openIdConnectView.authorizationRequest.clientId}" required="true"
                           label="client-id">
                <p:ajax event="keyup" listener="#{openIdConnectView.handleInputChange}"
                        update="auth-panelGrid"/>
              </p:inputText>
              <p:message for="client-id" display="icon"/>
              <p:outputLabel for="scope" value="Scope:"/>
              <p:inputText id="scope"
                           value="#{openIdConnectView.authorizationRequest.scope}"
                           label="scope">
                <p:ajax event="keyup" listener="#{openIdConnectView.handleInputChange}"
                        update="auth-panelGrid"/>
              </p:inputText>
              <p:spacer/>
              <p:outputLabel for="prompt" value="Prompt:"/>
              <p:inputText id="prompt"
                           value="#{openIdConnectView.authorizationRequest.prompt}"
                           valueChangeListener="#{openIdConnectView.clean}"
                           label="prompt">
                <p:ajax event="keyup" listener="#{openIdConnectView.handleInputChange}"
                        update="auth-panelGrid"/>
              </p:inputText>
              <p:spacer/>
              <p:outputLabel for="max-age" value="Max age:"/>
              <p:inputText id="max-age"
                           value="#{openIdConnectView.authorizationRequest.maxAge}"
                           label="max-age">
                <p:ajax event="keyup" listener="#{openIdConnectView.handleInputChange}"
                        update="auth-panelGrid"/>
              </p:inputText>
              <p:spacer/>
              <p:outputLabel for="login-hint" value="Login hint:"/>
              <p:inputText id="login-hint" required="false"
                           value="#{openIdConnectView.authorizationRequest.loginHint}"
                           label="login-hint">
                <p:ajax event="keyup" listener="#{openIdConnectView.handleInputChange}"
                        update="auth-panelGrid"/>
              </p:inputText>
              <p:spacer/>
              <p:commandButton
                value="#{empty openIdConnectView.authenticationRequest ?
                'Generate' : (openIdConnectView.showAuthenticationRequest ?
                'Hide Request' : 'Show Request')}"
                update="auth-panelGrid :form:msgs" process="@this"
                action="#{openIdConnectView.generateAuthenticationRequest}"
                icon="#{empty openIdConnectView.authenticationRequest ?
                'pi pi-check' : (openIdConnectView.showAuthenticationRequest ?
                'pi pi-eye-slash' : 'pi pi-eye')}"/>
              <div style="height: 10px;"></div>
              <p:outputPanel id="authentication-request-panel"
                             style="max-height: 20em; max-width: 60em; overflow: auto;">
                <h:outputLabel for="authentication-request" value="Authentication request: "
                               rendered="#{not empty openIdConnectView.authenticationRequest and openIdConnectView.showAuthenticationRequest}"/>
                <div style="height: 10px;"></div>
                <p:inputTextarea id="authentication-request" value="#{openIdConnectView.formattedAuthRequest}"
                                 readonly="true" autoResize="false" rows="5" cols="60"
                                 style="width: 100%; height: 100%; border: 1px solid #ccc;"
                                 rendered="#{not empty openIdConnectView.formattedAuthRequest and openIdConnectView.showAuthenticationRequest}"/>
              </p:outputPanel>
              <p:commandButton value="Send Authentication Request"
                               rendered="#{not empty openIdConnectView.authenticationRequest and openIdConnectView.showAuthenticationRequest}"
                               update="auth-code-panelGrid" process="@this"
                               action="#{openIdConnectView.sendAuthenticationRequest()}"
                               icon="#{empty openIdConnectView.authenticationRequest ? 'pi pi-check' : (openIdConnectView.showAuthenticationRequest ? 'pi pi-eye-slash' : 'pi pi-eye')}"/>
            </h:panelGrid>
            <h:panelGrid id="auth-code-panelGrid" columns="2" styleClass="mb-3"
                         columnClasses="width: 20%; vertical-align: top;, width: 80%;"
                         rendered="#{not empty openIdConnectView.authCode}">
              <p:outputLabel for="auth-code" rendered="#{not empty openIdConnectView.authCode}"
                             value="Authentication response:"/>
              <p:inputText id="auth-code" rendered="#{not empty openIdConnectView.authCode}"
                           value="#{openIdConnectView.authCode}" readonly="true"
                           size="100" label="auth-code"/>
            </h:panelGrid>
          </p:tab>
          <p:tab title="3. ID Token">
            <p:panelGrid id="token-panelGrid" columns="1" styleClass="mb-3">
              <p:outputLabel for="auth-code-2" rendered="#{not empty openIdConnectView.authCode}"
                             value="Authentication response:"/>
              <p:inputText id="auth-code-2" rendered="#{not empty openIdConnectView.authCode}"
                           value="#{openIdConnectView.authCode}" readonly="true"
                           size="100" label="auth-code"/>
              <p:commandButton value="Send Token Request"
                               rendered="#{not empty openIdConnectView.authenticationRequest and openIdConnectView.showAuthenticationRequest}"
                               update="token-panelGrid refresh-panelGrid" process="@this"
                               action="#{openIdConnectView.sendTokenRequest()}"
                               icon="#{empty openIdConnectView.authenticationRequest ? 'pi pi-check' : (openIdConnectView.showAuthenticationRequest ? 'pi pi-eye-slash' : 'pi pi-eye')}"/>
              <p:outputLabel for="token-request" rendered="#{not empty openIdConnectView.formattedTokenRequest}"
                             value="Token request:"/>
              <p:inputTextarea id="token-request" rendered="#{not empty openIdConnectView.formattedTokenRequest}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.formattedTokenRequest}" readonly="true"
                               label="token-request"/>
              <p:outputLabel for="token-header" rendered="#{not empty openIdConnectView.headerJson}"
                             value="ID Token header:"/>
              <p:inputTextarea id="token-header" rendered="#{not empty openIdConnectView.headerJson}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.headerJson}" readonly="true"
                               label="token-header"/>
              <p:outputLabel for="token-payload" rendered="#{not empty openIdConnectView.payloadJson}"
                             value="ID Token payload:"/>
              <p:inputTextarea id="token-payload" rendered="#{not empty openIdConnectView.payloadJson}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 20%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.payloadJson}" readonly="true"
                               label="token-payload"/>
              <p:outputLabel for="token-signature" rendered="#{not empty openIdConnectView.idTokenSignature}"
                             value="ID Token signature:"/>
              <p:inputText id="token-signature" rendered="#{not empty openIdConnectView.idTokenSignature}"
                           value="#{openIdConnectView.idTokenSignature}" readonly="true"
                           size="100" label="token-signature"/>
            </p:panelGrid>
          </p:tab>
          <p:tab title="4. Refresh Token">
            <p:panelGrid id="refresh-panelGrid" columns="1" styleClass="mb-3" >
              <p:commandButton value="Send Refresh Request"
                               rendered="#{not empty openIdConnectView.tokenResponse}"
                               update="refresh-panelGrid" process="@this"
                               action="#{openIdConnectView.sendRefreshRequest()}"
                               icon="pi pi-check"/>
              <p:outputLabel for="refresh-request" rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                             value="Refresh request:"/>
              <p:inputTextarea id="refresh-request" rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.formattedRefreshRequest}" readonly="true"
                               label="refresh-request"/>
              <p:outputLabel for="refresh-response" rendered="#{not empty openIdConnectView.refreshResponse}"
                             value="Refresh response:"/>
              <p:inputTextarea id="refresh-response" rendered="#{not empty openIdConnectView.refreshResponse}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.refreshResponse}" readonly="true"
                               label="token-header"/>
              <p:outputLabel for="refresh-payload" rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                             value="ID Token payload:"/>
              <p:inputTextarea id="refresh-payload" rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.refreshPayloadJson}" readonly="true"
                               label="refresh-payload"/>
            </p:panelGrid>
          </p:tab>
          <p:tab title="5. UserInfo">
            <p:panelGrid id="userinfo-panelGrid" columns="1" styleClass="mb-3">
              <p:commandButton value="Send UserInfo Request"
                               rendered="#{not empty openIdConnectView.authenticationRequest}"
                               update="userinfo-panelGrid" process="@this"
                               action="#{openIdConnectView.sendUserInfoRequest()}"
                               icon="pi pi-check"/>
              <p:outputLabel for="userinfo-request" rendered="#{not empty openIdConnectView.formattedUserInfoRequest}"
                             value="UserInfo request:"/>
              <p:inputText id="userinfo-request" rendered="#{not empty openIdConnectView.formattedUserInfoRequest}"
                               value="#{openIdConnectView.formattedUserInfoRequest}" readonly="true"
                               label="userinfo-request" size="60"/>
              <p:outputLabel for="userinfo-response" rendered="#{not empty openIdConnectView.userInfoResponse}"
                             value="UserInfo response:"/>
              <p:inputTextarea id="userinfo-response" rendered="#{not empty openIdConnectView.userInfoResponse}"
                               autoResize="false" rows="5" cols="30"
                               style="width: 25%; height: 100%; border: 1px solid #ccc;"
                               value="#{openIdConnectView.userInfoResponse}" readonly="true"
                               label="token-header"/>
            </p:panelGrid>
          </p:tab>
          <p:tab title="Reset">
            <p:panelGrid id="reset-panelGrid" columns="1" styleClass="mb-3">
              <p:commandButton value="Reset"
                               update="userinfo-panelGrid reset-panelGrid" process="@this"
                               action="#{openIdConnectView.reset()}"
                               icon="pi pi-check"/>
            </p:panelGrid>
          </p:tab>
        </p:tabView>
      </div>
    </h:form>
  </h:body>
</f:view>
</html>
