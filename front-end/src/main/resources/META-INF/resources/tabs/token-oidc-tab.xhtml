<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets">
  <p:panelGrid id="token-panelGrid" columns="1" cellpadding="7" styleClass="mb-3" style="text-align: left;">
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.authCode}"
                   value="Authentication response:"/>
    <p:inputText rendered="#{not empty openIdConnectView.authCode}"
                 value="#{openIdConnectView.authCode}" readonly="true"
                 size="100"/>
    <p:commandButton value="Send Token Request"
                     rendered="#{not empty openIdConnectView.authenticationRequest and openIdConnectView.showAuthenticationRequest}"
                     update="@parent :form:oidc-tabs:refresh-tab:@child(0) :form:msgs"
                     process="@this"
                     action="#{openIdConnectView.sendTokenRequest()}"
                     icon="#{empty openIdConnectView.authenticationRequest ? 'pi pi-check' : (openIdConnectView.showAuthenticationRequest ? 'pi pi-eye-slash' : 'pi pi-eye')}"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.formattedTokenRequest}"
                   value="Token request:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.formattedTokenRequest}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 25%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.formattedTokenRequest}" readonly="true"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.headerJson}"
                   value="ID Token header:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.headerJson}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 25%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.headerJson}" readonly="true"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.payloadJson}"
                   value="ID Token payload:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.payloadJson}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 20%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.payloadJson}" readonly="true"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.idTokenSignature}"
                   value="ID Token signature:"/>
    <p:inputText rendered="#{not empty openIdConnectView.idTokenSignature}"
                 value="#{openIdConnectView.idTokenSignature}" readonly="true"
                 size="100"/>
  </p:panelGrid>
</ui:composition>
