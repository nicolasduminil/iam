<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets">
  <p:panelGrid columns="1" cellpadding="7" styleClass="mb-3" style="text-align: left;">
    <p:commandButton value="Invoke public service"
                     rendered="#{not empty openIdConnectView.tokenResponse}"
                     update="@parent" process="@this"
                     action="#{openIdConnectView.invokePublicService()}"
                     icon="pi pi-check"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.publicServiceResponse}"
                   value="Public service response:"/>
    <p:inputText rendered="#{not empty openIdConnectView.publicServiceResponse}"
                 value="#{openIdConnectView.publicServiceResponse}"
                 readonly="true" size="60"/>
    <p:commandButton value="Invoke secured service"
                     rendered="#{not empty openIdConnectView.tokenResponse}"
                     update="@parent" process="@this"
                     action="#{openIdConnectView.invokeSecuredService()}"
                     icon="pi pi-check"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.securedServiceResponse}"
                   value="Secured service response:"/>
    <p:inputText rendered="#{not empty openIdConnectView.securedServiceResponse}"
                 value="#{openIdConnectView.securedServiceResponse}"
                 readonly="true" size="60"/>
  </p:panelGrid>
</ui:composition>
