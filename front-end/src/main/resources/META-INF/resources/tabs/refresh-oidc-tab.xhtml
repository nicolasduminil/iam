<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets">
  <p:panelGrid columns="1" cellpadding="7" styleClass="mb-3" style="text-align: left;">
    <p:commandButton value="Send Refresh Request"
                     rendered="#{not empty openIdConnectView.tokenResponse}"
                     update="@parent" process="@this"
                     action="#{openIdConnectView.sendRefreshRequest()}"
                     icon="pi pi-check"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                   value="Refresh request:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 25%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.formattedRefreshRequest}" readonly="true"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.refreshResponse}"
                   value="Refresh response:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.refreshResponse}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 25%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.refreshResponse}" readonly="true"/>
    <p:outputLabel for="@next" rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                   value="ID Token payload:"/>
    <p:inputTextarea rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                     autoResize="false" rows="5" cols="30"
                     style="width: 25%; height: 100%; border: 1px solid #ccc;"
                     value="#{openIdConnectView.refreshPayloadJson}" readonly="true"/>
  </p:panelGrid>
</ui:composition>
