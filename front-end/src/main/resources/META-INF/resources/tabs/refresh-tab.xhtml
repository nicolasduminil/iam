<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets">
  <p:tab title="4. Refresh Token">
    <p:panelGrid id="refresh-panelGrid" columns="1" styleClass="mb-3">
      <p:commandButton value="Send Refresh Request"
                       rendered="#{not empty openIdConnectView.tokenResponse}"
                       update="refresh-panelGrid" process="@this"
                       action="#{openIdConnectView.sendRefreshRequest()}"
                       icon="pi pi-check"/>
      <p:outputLabel for="refresh-request" rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                     value="Refresh request:"/>
      <p:inputTextarea id="refresh-request" rendered="#{not empty openIdConnectView.formattedRefreshRequest}"
                       autoResize="false" rows="5" cols="30"
                       style="width: 25%; height: 100%; border: 1px solid #ccc;"
                       value="#{openIdConnectView.formattedRefreshRequest}" readonly="true"
                       label="refresh-request"/>
      <p:outputLabel for="refresh-response" rendered="#{not empty openIdConnectView.refreshResponse}"
                     value="Refresh response:"/>
      <p:inputTextarea id="refresh-response" rendered="#{not empty openIdConnectView.refreshResponse}"
                       autoResize="false" rows="5" cols="30"
                       style="width: 25%; height: 100%; border: 1px solid #ccc;"
                       value="#{openIdConnectView.refreshResponse}" readonly="true"
                       label="token-header"/>
      <p:outputLabel for="refresh-payload" rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                     value="ID Token payload:"/>
      <p:inputTextarea id="refresh-payload" rendered="#{not empty openIdConnectView.refreshPayloadJson}"
                       autoResize="false" rows="5" cols="30"
                       style="width: 25%; height: 100%; border: 1px solid #ccc;"
                       value="#{openIdConnectView.refreshPayloadJson}" readonly="true"
                       label="refresh-payload"/>
    </p:panelGrid>
  </p:tab>
</ui:composition>
