quarkus.http.port=8082
quarkus.container-image.build=true
quarkus.container-image.group=nicolasduminil
quarkus.container-image.name=iam-front-end
keycloak.realm-name=myrealm
keycloak.server-url=http://localhost:8080
keycloak.issuer-uri=/realms/${keycloak.realm-name}/.well-known/openid-configuration
keycloak.authorization-uri=/realms/${keycloak.realm-name}/protocol/openid-connect/auth
keycloak.redirect-uri=http://localhost:8080
iam_client/mp-rest/url=http://localhost:8081
#quarkus.oidc.auth-server-url=${keycloak.server-url}/auth/realms/${keycloak.realm-name}
#quarkus.oidc.auth-server-url=${keycloak.server-url}/realms/myrealm/protocol/openid-connect/auth
quarkus.oidc.auth-server-url=https://localhost:8080/realms/myrealm
quarkus.oidc.client-id=fe
quarkus.oidc.credentials.secret=this_is_a_secret
quarkus.oidc.application-type=web-app
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.oidc.token-state-manager.split-tokens=true