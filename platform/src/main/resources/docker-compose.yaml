version: "3.7"
services:
  keycloak:
    image: quay.io/keycloak/keycloak
    hostname: keycloak
    container_name: keycloak
    ports:
      - "8080:8080"
      - "9990:9990"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./scripts/customize.sh:/opt/keycloak/customization/customize.sh
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://keycloak:8080/health/ready" ]
      interval: 10s
      timeout: 2s
      retries: 5
    command: ["start-dev"]
  node:
    image: node:20
    user: "node"
    working_dir: /home/node/app
    volumes:
      - ./:/home/node/app
    expose:
      - "8081"
    command: "npm start"